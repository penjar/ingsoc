<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente de IA para TIC</title>
  <style>
    /* Estilo general */
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Contenedor principal */
    .container {
      text-align: center;
      max-width: 800px; /* Incrementar el ancho máximo */
      width: 90%;
      padding: 40px; /* Aumentar el espaciado interno */
      background: rgba(30, 30, 30, 0.9);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    }

    /* Título */
    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #00d4ff;
    }

    /* Campo de entrada */
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 1rem;
      background-color: #2a2a2a;
      color: #ffffff;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 5px #00d4ff;
    }

    /* Botón */
    button {
      background-color: #00d4ff;
      color: #ffffff;
      border: none;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background-color: #008bb5;
      transform: scale(1.05);
    }

    /* Área de resultado */
    .result {
      margin-top: 20px;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 8px;
      font-size: 1.1rem; 
      line-height: 1.5; 
      min-height: 150px; 
      max-height: 300px;
      overflow-y: auto; 
      text-align: left;
    }

    /* Mensaje de carga */
    .loading {
      font-style: italic;
      color: #00d4ff;
    }

    /* Estilo para el contenido generado */
    .result h1, .result h2, .result h3 {
      color: #00d4ff;
      margin-top: 15px;
    }

    .result p {
      margin: 10px 0;
      line-height: 1.8;
    }

    .result ul {
      margin: 10px 0;
      padding-left: 20px;
    }

    .result li {
      margin-bottom: 5px;
    }

    .result strong {
      color: #00d4ff;
    }

    .result::-webkit-scrollbar {
      width: 8px;
    }

    .result::-webkit-scrollbar-thumb {
      background: #00d4ff;
      border-radius: 4px;
    }

    .result::-webkit-scrollbar-thumb:hover {
      background: #008bb5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Asistente de IA para TIC</h1>
    <input type="text" id="topicInput" placeholder="Escribe un tema sobre TIC (e.g., Ciberseguridad)">
    <button id="generateButton">Generar Explicación</button>
    <div class="result" id="resultArea">Aquí aparecerá la respuesta generada por la IA.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // Referencias a los elementos del DOM
    const topicInput = document.getElementById('topicInput');
    const generateButton = document.getElementById('generateButton');
    const resultArea = document.getElementById('resultArea');

    // Función para conectarse al servidor Node.js y obtener la respuesta de la API
    async function fetchAIResponse(topic) {
      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ topic }),
        });

        if (!response.ok) {
          throw new Error(error.message || 'Error al conectar con la API');
        }

        const data = await response.json();
        return data.response;
      } catch (error) {
        console.error('Error al conectar con la API:', error);
        throw new Error(error.message || 'Error al conectar con la API');
      }
    }

    // Evento al hacer clic en el botón "Generar"
    generateButton.addEventListener('click', async () => {
      const topic = topicInput.value.trim();

      // Validar entrada
      if (!topic) {
        resultArea.textContent = 'Por favor, introduce un tema válido.';
        return;
      }

      // Mostrar mensaje de "Generando..."
      resultArea.innerHTML = '<span class="loading">Generando...</span>';

      try {
        // Llamar a la función que simula la API
        const response = await fetchAIResponse(topic);
        console.log('Respuesta de la API:', response); // Log para depuración

        // Usar Marked.js para convertir el texto Markdown a HTML
        resultArea.innerHTML = marked.parse(response);
      } catch (error) {
        resultArea.textContent = error.message || 'Ocurrió un error al generar la respuesta.';
        console.error(error);
      }
    });

    // Evento al presionar ENTER
    topicInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        generateButton.click();
      }
    });
  </script>
</body>
</html>
